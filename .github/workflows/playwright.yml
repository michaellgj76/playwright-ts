name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.playwright-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Get Playwright version from script
        id: playwright-version
        run: |
          VERSION=$(node utils/scripts/get-playwright-version.js)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  test:
    needs: get-version
    timeout-minutes: 10
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v${{ needs.get-version.outputs.version }}-jammy
      # Important: Run as root inside the container to avoid permission issues and --ipc=host prevents memory issues
      options: --user 0 --ipc=host

    env:
      HOME: /root # For preventing Firefox failures
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ENV: PROD
      INKSPECTRA_BASE_URL: ${{ vars.INKSPECTRA_BASE_URL }}
      MICHA_ADMIN_EMAIL: ${{ secrets.MICHA_ADMIN_EMAIL }}
      MICHA_ADMIN_PASSWORD: ${{ secrets.MICHA_ADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"
      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests with 4 workers
        run: npx playwright test --workers 4
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
        timeout-minutes: 10
